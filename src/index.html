<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Downloader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-window">
    <div class="titlebar" data-tauri-drag-region>
      <div class="titlebar-left">
        <span class="titlebar-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
        </span>
        <span class="titlebar-title">YT DOWNLOADER</span>
      </div>
      <div class="titlebar-controls">
        <button class="titlebar-btn btn-update" id="updateBtn" title="Check for yt-dlp updates">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
        <button class="titlebar-btn btn-minimize" id="minimizeBtn"></button>
        <button class="titlebar-btn btn-close" id="closeBtn"></button>
      </div>
    </div>

    <div class="container">
      <div class="version-badge" id="versionBadge">
        <span class="version-dot"></span>
        <span id="versionText">Checking yt-dlp...</span>
      </div>

      <div class="url-section">
        <label class="input-label">YouTube URL</label>
        <div class="url-input-row">
          <input type="text" class="url-input" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." spellcheck="false">
          <button class="btn-analyze" id="analyzeBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>Analyze</span>
          </button>
        </div>
      </div>

      <div class="info-section" id="infoSection" style="display:none;">
        <div class="video-title" id="videoTitle"></div>
        <div class="format-selector">
          <div class="format-toggle">
            <button class="toggle-option active" data-format="video" id="videoToggle">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
              MP4
            </button>
            <button class="toggle-option" data-format="audio" id="audioToggle">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
              Audio
            </button>
          </div>

          <div id="resolutionOptions" class="resolution-options"></div>
        </div>
      </div>

      <div class="output-section">
        <label class="input-label">Output Folder</label>
        <div class="output-row">
          <div class="output-path" id="outputPath">No folder selected</div>
          <button class="btn-outline" id="browseBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            Browse
          </button>
          <button class="btn-icon" id="openFolderBtn" disabled title="Open output folder">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-download" id="downloadBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="downloadBtnText">Download</span>
      </button>

      <div class="progress-section" id="progressSection" style="display:none;">
        <div class="progress-header">
          <span class="progress-filename" id="progressFilename"></span>
          <span class="progress-percent" id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
        <div class="progress-details">
          <div class="progress-stat">
            <span class="stat-label">Size</span>
            <span class="stat-value" id="progressSize">--</span>
          </div>
          <div class="progress-stat">
            <span class="stat-label">Speed</span>
            <span class="stat-value" id="progressSpeed">--</span>
          </div>
          <div class="progress-stat">
            <span class="stat-label">ETA</span>
            <span class="stat-value" id="progressEta">--</span>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="update-overlay" id="updateOverlay" style="display:none;">
      <div class="update-content">
        <div class="update-titlebar">
          <span>Updating yt-dlp</span>
          <button class="titlebar-btn btn-close" id="updateCloseBtn"></button>
        </div>
        <div class="update-log" id="updateLog"></div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
